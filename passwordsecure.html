<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PasswordSecure - Générateur de mots de passe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 15px;
    }

    .card {
      background: #020617;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 0 25px #000;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 5px;
      color: #38bdf8;
    }

    .slogan {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    label, select, button {
      width: 100%;
      margin-top: 12px;
    }

    select, button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #22c55e;
      color: #022c22;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #result {
      margin-top: 15px;
      padding: 12px;
      background: #0f172a;
      border-radius: 6px;
      font-family: monospace;
      border: 1px solid #1f2937;
      word-break: break-all;
      font-size: 18px;
    }

    #copyBtn {
      background: #3b82f6;
      margin-top: 10px;
    }

    #copyBtn:hover {
      background: #2563eb;
    }

    small {
      color: #9ca3af;
      display: block;
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>PasswordSecure</h1>
    <div class="slogan">Sécurise ta vie en un clic</div>

    <label for="mode">Niveau de sécurité :</label>
    <select id="mode">
      <option value="5">Facile à retenir (5 caractères)</option>
      <option value="10">Simple (10 caractères)</option>
      <option value="15">Impossible à trouver (15 caractères)</option>
      <option value="20">Trouvable par personne (20 caractères)</option>
    </select>

    <button onclick="generate()">Générer</button>

    <div id="result">Ton mot de passe apparaîtra ici</div>

    <button id="copyBtn" onclick="copyPass()">Copier le mot de passe</button>

    <small>⚠ Ne partage jamais tes mots de passe.</small>
  </div>

  <script>
    function generate() {
      const length = parseInt(document.getElementById("mode").value);
      const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_-+=[]{};:,.?/";
      let pass = "";

      for (let i = 0; i < length; i++) {
        pass += chars[Math.floor(Math.random() * chars.length)];
      }

      document.getElementById("result").innerText = pass;
    }

    function copyPass() {
      const text = document.getElementById("result").innerText;
      navigator.clipboard.writeText(text);
      alert("Mot de passe copié !");
    }
  </script>
</body>
</html>
